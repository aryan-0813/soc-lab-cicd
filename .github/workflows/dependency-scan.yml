name: Dependency Vulnerability Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  pip-audit:
    name: Python Dependency Audit
    runs-on: [self-hosted, linux, cicd]
    container:
      image: python:3.10-slim
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip install -r src/requirements.txt
          pip-audit \
            --format json \
            --output pip-audit-results.json \
            -r src/requirements.txt
        continue-on-error: true

      - name: Display Results
        run: |
          echo "=== DEPENDENCY VULNERABILITIES ==="
          cat pip-audit-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          deps = data.get('dependencies', [])
          vulnerable = [d for d in deps if d.get('vulns')]
          print(f'Total packages scanned: {len(deps)}')
          print(f'Vulnerable packages: {len(vulnerable)}')
          print()
          for dep in vulnerable:
              print(f\"Package: {dep['name']} {dep['version']}\")
              for vuln in dep['vulns']:
                  print(f\"  CVE: {vuln['id']}\")
                  print(f\"  Description: {vuln['description'][:100]}...\")
                  print(f\"  Fix: Upgrade to {vuln.get('fix_versions', ['unknown'])}\")
              print()
          "

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  dependabot-check:
    name: Check Dependabot Config
    runs-on: [self-hosted, linux, cicd]
    container:
      image: python:3.10-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Dependabot config exists
        run: |
          if [ -f .github/dependabot.yml ]; then
            echo "✅ Dependabot is configured"
            cat .github/dependabot.yml
          else
            echo "⚠️ Dependabot not configured - creating config"
            mkdir -p .github
            cat > .github/dependabot.yml << 'DEPENDABOT'
          version: 2
          updates:
            - package-ecosystem: "pip"
              directory: "/src"
              schedule:
                interval: "weekly"
              labels:
                - "security"
                - "dependencies"
          DEPENDABOT
            echo "✅ Dependabot config created"
          fi
