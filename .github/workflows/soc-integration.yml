name: SOC Integration

on:
  workflow_run:
    workflows: ["Semgrep SAST Scan", "Secrets Scanning", "Dependency Vulnerability Scan"]
    types: [completed]

jobs:
  send-to-soc:
    name: Send Findings to SOC
    runs-on: [self-hosted, linux, cicd]
    container:
      image: python:3.10
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Install requests
        run: pip install requests

      - name: Send findings to Wazuh
        env:
          WAZUH_API_URL: ${{ secrets.WAZUH_API_URL }}
          WAZUH_API_USER: ${{ secrets.WAZUH_API_USER }}
          WAZUH_API_PASS: ${{ secrets.WAZUH_API_PASS }}
        run: |
          python3 << 'PYTHON'
          import json
          import os
          import requests
          import datetime

          wazuh_url = os.environ.get('WAZUH_API_URL')
          wazuh_user = os.environ.get('WAZUH_API_USER')
          wazuh_pass = os.environ.get('WAZUH_API_PASS')

          if not wazuh_url or not wazuh_user or not wazuh_pass:
              print('Wazuh API credentials not fully configured')
              exit(0)


          def get_jwt_token(url, user, password):
              resp = requests.get(
                  f"{url}/security/user/authenticate",
                  auth=(user, password),
                  verify=False
              )
              if resp.status_code != 200:
                  print(f"❌ Wazuh authentication failed: {resp.status_code} - {resp.text}")
                  return None
              return resp.json()['data']['token']


          token = get_jwt_token(wazuh_url, wazuh_user, wazuh_pass)

          if not token:
              print('Could not obtain Wazuh token — aborting SOC integration for this run')
              exit(1)

          wazuh_events_url = f"{wazuh_url}/events"

          findings = []

          # Parse Semgrep results
          if os.path.exists('semgrep-results/semgrep-results.json'):
              with open('semgrep-results/semgrep-results.json') as f:
                  data = json.load(f)
                  for r in data.get('results', []):
                      findings.append({
                          'type': 'SAST',
                          'tool': 'Semgrep',
                          'severity': r['extra']['severity'],
                          'rule': r['check_id'],
                          'file': r['path'],
                          'line': r['start']['line'],
                          'message': r['extra']['message'],
                          'repo': '${{ github.repository }}',
                          'branch': '${{ github.ref_name }}',
                          'commit': '${{ github.sha }}'
                      })

          # Parse TruffleHog results
          if os.path.exists('trufflehog-results/trufflehog-results.json'):
              with open('trufflehog-results/trufflehog-results.json') as f:
                  try:
                      data = json.load(f)
                      if isinstance(data, list):
                          for s in data:
                              findings.append({
                                  'type': 'SECRET',
                                  'tool': 'TruffleHog',
                                  'severity': s.get('severity', 'MEDIUM'),
                                  'rule': s.get('rule', {}).get('id', 'unknown'),
                                  'file': s.get('path', 'unknown'),
                                  'message': s.get('rule', {}).get('message', 'Secret detected'),
                                  'repo': '${{ github.repository }}',
                                  'branch': '${{ github.ref_name }}',
                                  'commit': '${{ github.sha }}'
                              })
                  except:
                      pass

          # Parse pip-audit results
          if os.path.exists('pip-audit-results/pip-audit-results.json'):
              with open('pip-audit-results/pip-audit-results.json') as f:
                  data = json.load(f)
                  for dep in data.get('dependencies', []):
                      for vuln in dep.get('vulns', []):
                          findings.append({
                              'type': 'SCA',
                              'tool': 'pip-audit',
                              'severity': 'HIGH',
                              'rule': vuln['id'],
                              'package': dep['name'],
                              'version': dep['version'],
                              'message': vuln['description'][:200],
                              'fix': str(vuln.get('fix_versions', [])),
                              'repo': '${{ github.repository }}',
                              'branch': '${{ github.ref_name }}',
                              'commit': '${{ github.sha }}'
                          })

          print(f'Total findings to send: {len(findings)}')

          if not findings:
              print('No findings — clean pipeline!')
              exit(0)

          # Build one JSON-encoded string per finding (Wazuh's /events API
          # requires each item in "events" to be a string, not a raw object)
          event_strings = []
          for finding in findings:
              payload = {
                  'timestamp': datetime.datetime.utcnow().isoformat(),
                  'source': 'github-cicd',
                  'repository': '${{ github.repository }}',
                  'finding': finding
              }
              event_strings.append(json.dumps(payload))
              print(f"Queued: [{finding['type']}] {finding.get('rule', 'unknown')}")

          # Send all findings in a single batched request
          try:
              resp = requests.post(
                  wazuh_events_url,
                  json={"events": event_strings},
                  headers={'Authorization': f'Bearer {token}'},
                  timeout=10,
                  verify=False
              )
              if resp.status_code in (200, 201):
                  body = resp.json()
                  sent = body.get('data', {}).get('total_affected_items', len(event_strings))
                  failed = body.get('data', {}).get('total_failed_items', 0)
                  print(f"✅ Batch sent: {sent} accepted, {failed} failed")
                  if body.get('data', {}).get('failed_items'):
                      print(f"Failed items: {body['data']['failed_items']}")
              else:
                  print(f"❌ Batch failed: {resp.status_code} - {resp.text}")
          except Exception as e:
              print(f"❌ Error sending batch: {e}")

          PYTHON

      - name: Job Summary
        run: |
          echo "## SOC Integration Summary" >> $GITHUB_STEP_SUMMARY
          echo "Findings sent to Wazuh → Shuffle SOAR → TheHive" >> $GITHUB_STEP_SUMMARY
          echo "Check TheHive for new alerts: http://10.8.0.1:9000" >> $GITHUB_STEP_SUMMARY
