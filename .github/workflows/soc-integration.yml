name: SOC Integration

on:
  workflow_run:
    workflows: ["Semgrep SAST Scan", "Secrets Scanning", "Dependency Vulnerability Scan"]
    types: [completed]

jobs:
  send-to-soc:
    name: Send Findings to SOC
    runs-on: [self-hosted, linux, cicd]
    container:
      image: python:3.10
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Install requests
        run: pip install requests

      - name: Send findings to Shuffle
        env:
          SHUFFLE_WEBHOOK: ${{ secrets.SHUFFLE_WEBHOOK_URL }}
        run: |
          python3 << 'PYTHON'
          import json
          import os
          import requests
          import datetime

          webhook_url = os.environ.get('SHUFFLE_WEBHOOK')

          if not webhook_url:
              print('SHUFFLE_WEBHOOK_URL not configured')
              exit(0)

          findings = []

          # Parse Semgrep results
          if os.path.exists('semgrep-results/semgrep-results.json'):
              with open('semgrep-results/semgrep-results.json') as f:
                  data = json.load(f)
                  for r in data.get('results', []):
                      findings.append({
                          'type': 'SAST',
                          'tool': 'Semgrep',
                          'severity': r['extra']['severity'],
                          'rule': r['check_id'],
                          'file': r['path'],
                          'line': r['start']['line'],
                          'message': r['extra']['message'],
                          'repo': '${{ github.repository }}',
                          'branch': '${{ github.ref_name }}',
                          'commit': '${{ github.sha }}'
                      })

          # Parse TruffleHog results
          if os.path.exists('trufflehog-results/trufflehog-results.json'):
              with open('trufflehog-results/trufflehog-results.json') as f:
                  try:
                      data = json.load(f)
                      if isinstance(data, list):
                          for s in data:
                              findings.append({
                                  'type': 'SECRET',
                                  'tool': 'TruffleHog',
                                  'severity': s.get('severity', 'MEDIUM'),
                                  'rule': s.get('rule', {}).get('id', 'unknown'),
                                  'file': s.get('path', 'unknown'),
                                  'message': s.get('rule', {}).get('message', 'Secret detected'),
                                  'repo': '${{ github.repository }}',
                                  'branch': '${{ github.ref_name }}',
                                  'commit': '${{ github.sha }}'
                              })
                  except:
                      pass

          # Parse pip-audit results
          if os.path.exists('pip-audit-results/pip-audit-results.json'):
              with open('pip-audit-results/pip-audit-results.json') as f:
                  data = json.load(f)
                  for dep in data.get('dependencies', []):
                      for vuln in dep.get('vulns', []):
                          findings.append({
                              'type': 'SCA',
                              'tool': 'pip-audit',
                              'severity': 'HIGH',
                              'rule': vuln['id'],
                              'package': dep['name'],
                              'version': dep['version'],
                              'message': vuln['description'][:200],
                              'fix': str(vuln.get('fix_versions', [])),
                              'repo': '${{ github.repository }}',
                              'branch': '${{ github.ref_name }}',
                              'commit': '${{ github.sha }}'
                          })

          print(f'Total findings to send: {len(findings)}')

          if not findings:
              print('No findings — clean pipeline!')
              exit(0)

          # Send each finding to Shuffle
          sent = 0
          failed = 0
          for finding in findings:
              payload = {
                  'timestamp': datetime.datetime.utcnow().isoformat(),
                  'source': 'github-cicd',
                  'repository': '${{ github.repository }}',
                  'finding': finding
              }
              try:
                  resp = requests.post(
                      webhook_url,
                      json=payload,
                      timeout=10,
                      verify=False
                  )
                  if resp.status_code == 200:
                      sent += 1
                      print(f"✅ Sent: [{finding['type']}] {finding.get('rule', 'unknown')}")
                  else:
                      failed += 1
                      print(f"❌ Failed: {resp.status_code}")
              except Exception as e:
                  failed += 1
                  print(f"❌ Error: {e}")

          print(f"\nSummary: {sent} sent, {failed} failed")
          PYTHON

      - name: Job Summary
        run: |
          echo "## SOC Integration Summary" >> $GITHUB_STEP_SUMMARY
          echo "Findings sent to Shuffle SOAR → TheHive" >> $GITHUB_STEP_SUMMARY
          echo "Check TheHive for new alerts: http://10.8.0.1:9000" >> $GITHUB_STEP_SUMMARY
