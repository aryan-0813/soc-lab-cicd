name: Secrets Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: [self-hosted, linux, cicd]
    container:
      image: python:3.10-slim
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Install TruffleHog
        run: pip install trufflehog3

      - name: Run TruffleHog
        run: |
          trufflehog3 \
            --format json \
            --output trufflehog-results.json \
            . 2>/dev/null || true
          
          echo "=== TRUFFLEHOG FINDINGS ==="
          if [ -f trufflehog-results.json ]; then
            cat trufflehog-results.json | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              if isinstance(data, list):
                  print(f'Total secrets found: {len(data)}')
                  for s in data:
                      print(f\"Secret type: {s.get('rule', 'Unknown')}\")
                      print(f\"File: {s.get('path', 'Unknown')}\")
                      print()
              else:
                  print('No secrets found')
          except:
              print('No findings')
            "
          fi

      - name: Upload TruffleHog Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trufflehog-results
          path: trufflehog-results.json
